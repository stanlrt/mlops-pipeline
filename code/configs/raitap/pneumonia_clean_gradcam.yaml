# RAITAP Hydra config — clean variant, Grad-CAM on ResNet-18 layer4.
# Run: uv run raitap --config-dir configs/raitap --config-name pneumonia_clean_gradcam

hardware: "cpu"
experiment_name: "pneumonia-clean-gradcam"

model:
  source: "./artifacts/clean/resnet18.pt"
  arch: "resnet18"
  num_classes: 2

data:
  name: "chest-xray-clean"
  description: "Kaggle chest X-ray pneumonia, unmodified test split"
  source: "./data/processed/clean/test"
  labels:
    source: "./data/processed/clean/labels.csv"
    id_column: "image"
    column: "label"
    encoding: "index"

transparency:
  captum_gradcam:
    _target_: "CaptumExplainer"
    algorithm: "LayerGradCam"
    constructor:
      layer_path: "layer4"
    call:
      target: 1   # PNEUMONIA — explain "why is this PNEUMONIA"
    raitap:
      batch_size: 8
      sample_names:
        - "PNEUMONIA/person100_bacteria_478.jpeg"
        - "PNEUMONIA/person1_virus_11.jpeg"
        - "PNEUMONIA/person3_virus_16.jpeg"
        - "PNEUMONIA/person23_virus_56.jpeg"
      show_sample_names: true
    visualisers:
      - _target_: "CaptumImageVisualiser"
        constructor:
          method: "blended_heat_map"
          sign: "positive"
          show_colorbar: true
          title: "Grad-CAM (PNEUMONIA) — clean"
          include_original_image: true

metrics:
  _target_: "ClassificationMetrics"
  task: "binary"
  num_classes: 2
  average: "macro"

tracking:
  _target_: "MLFlowTracker"
  output_forwarding_url: "http://127.0.0.1:5001"
  log_model: true
  open_when_done: false

reporting:
  _target_: "PDFReporter"
  filename: "report_clean_gradcam.pdf"
  sample_selection: null
  formatting:
    figures_max_pages: 12
